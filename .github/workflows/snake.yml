name: Generate Contribution Snake 🐍

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours (more dynamic)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: smitdighe
          outputs: |
            dist/snake-light.svg?color_snake=#00f5ff&color_dots=#e6edf3,#9be9a8,#40c463,#30a14e,#216e39
            dist/snake-dark.svg?palette=github-dark&color_snake=#7b2ff7

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 update snake animation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
